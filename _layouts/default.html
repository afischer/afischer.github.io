<!DOCTYPE HTML>
<html>

<head>
    <meta charset="utf-8">
    <title>{{ site.name }}</title>
    <meta name="description" content="">
    <meta name="author" content="Andrew Fischer">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="css/normalize.css">
    <link rel="stylesheet" href="css/skeleton.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="img/favicon.png">

</head>

<body>
    <!-- Image -->
    <div class="container">
        <div class="row">
            <div class="three columns">
                <img src="img/AFMonogramOL.svg" class="u-full-width" alt="Andrew Fischer Monogram" />
            </div>
            <div class="nine columns" style="width: 100%;">
            </div>
        </div>
    </div>

    <div class="container">
        <div class="row">
            <!-- Sidebar -->
            <div class="three columns">
                <div class="fname">ANDREW</div>
                <div class="lname">FISCHER</div>
                <hr style="margin-top: 0.4em; margin-bottom: 1em; height:25px; border: 3px solid white; ">
                <!-- TODO: refactor -->
                <nav>
                    <ul>
                        <li {% if page.title == 'Home' %}class="active"{% endif %}>
                            <a href='/'><span>Home</span></a></li>
                        <li {% if page.title == 'CV' %}class="active"{% endif %}>
                            <a href='#'><span>Curriculum Vit&aelig;</span></a></li>
                        <li {% if page.title == 'Blog' %}class="active"{% endif %}>
                            <a href='/blog.html'><span>Blog</span></a></li>
                        <li {% if page.title == 'Contact' %}class="active"{% endif %}>
                            <a href='/contact.html'><span>Contact</span></a></li>
                    </ul>
                </nav>



            </div>

            <!-- Content -->
            <div class="nine columns" style="text-align: justify">

                {{ content }}

                <footer>
                    <hr> Made with &hearts; by Andrew Fischer, &copy; 2011-
                    <script>
                        document.write(new Date().getFullYear())
                    </script>. Hosted by GH.
                </footer>
            </div>
        </div>

    </div>

    <!-- Eventually, serve fonts locally -->
    <script src="//use.typekit.net/sow2jyc.js"></script>
    <script>try{Typekit.load();}catch(e){}</script>

    <script src="js/fittext.js" type="text/javascript"></script>
    <script src="js/script.js" type="text/javascript"></script>
</body>
<!-- © 2011-2015 Andrew Fischer -->

</html>
