      height: 100%;

    main {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      line-height: 1.45;
    }

    a, a:hover, a:visited {
      text-decoration: none;
      color: #66D9EF;
    }

    ul {
      list-style-type: square;
      padding-left: 0;
    }

    h1, h2, h3, h4, h5, h6 {
      font-weight: 700;
      margin-bottom: 0;
    }

    main .infobox {
      max-width: 400px;
    }

    @media screen and (max-width: 450px) {
      ul { list-style-position: inside; }
    }
